<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANDI - Sistem Administrasi Digital</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Menghubungkan Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-body">
    
    <header class="landing-header">
        <div class="header-left">
            <img src="https://lh3.googleusercontent.com/pw/AP1GczMBKZTCZZutQ_zePMshM1k2z_RCrsBbsHKY7UFVOqn-YRpG9dzKsOvZUCJPkZ5UxvgM9z61S6PQBZ9wpJKbKv-QRH3Zw9xWJhuFom80gEi_nJO3w1K7aDN--RwNFPYpw44wH2ira9LjzX2Tr_7Ghqxl=w70-h70-s-no-gm?authuser=0" alt="Logo Instansi" class="instansi-logo">
            <div class="header-titles">
                <span class="title-top">PEMERINTAH KABUPATEN BALANGAN</span>
                <span class="title-bottom">KECAMATAN LAMPIHONG</span>
            </div>
        </div>
        <div class="header-right">
            <button class="btn-header-login" id="btnOpenLoginModal">Masuk <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 5px;"></i></button>
        </div>
    </header>

    <main class="landing-main">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczPEHrsPAVtFC_tHPd2dXtsnVKqAU8SijbCb0CD8fDBt-kTyiXpKc63EkhOcJoTcr6_PBHctTc654aX_GZYUYt5PKWZ7Um7mKQs5WfXy46ZUbBrsF0T20bljlG7RMhH8bMHvzEG7VbqCUJXwtDlskMp6=w500-h500-s-no-gm?authuser=0" alt="Logo Utama SANDI" class="sandi-big-logo">
    </main>

    <footer class="landing-footer">
        <p class="footer-line1">AKSI PERUBAHAN KUALITAS PELAYANAN PUBLIK 2026</p>
        <p class="footer-line2">Oleh: Risnawati, S.Kom. / NIP 198103112010012012 / NDH_04</p>
    </footer>

    <!-- MODAL LOGIN (Telah Dipercantik) -->
    <div id="loginModal" class="modal-overlay" style="display: none;">
        <div class="modal-card width-small login-modal-card">
            <div class="modal-header borderless-header">
                <h3 class="login-modal-title"><i class="fa-solid fa-circle-user"></i> Akses Admin</h3>
                <button class="btn-close-modal" id="btnCloseLoginModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="loginForm" style="margin-top: 5px;">
                    <div class="form-group margin-bottom">
                        <label for="username">Username</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input type="text" id="username" required placeholder="Ketik username Anda">
                        </div>
                    </div>
                    <div class="form-group margin-bottom">
                        <label for="password">Password</label>
                        <div class="input-with-icon password-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" id="password" required placeholder="Ketik password Anda">
                            <button type="button" id="btnTogglePassword" class="btn-toggle-password" tabindex="-1">
                                <i class="fa-regular fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-actions no-margin" style="margin-top: 25px;">
                        <button type="submit" class="btn-submit" id="btnLogin" style="width: 100%; padding: 12px; font-size: 1.05rem;">
                            Masuk <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 5px;"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
</body>
</html>
